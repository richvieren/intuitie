<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intuïtie</title>
<link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@300;400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Luminous Indigo palette — light bg */
  --bg: #B9ACEE;
  --bg-soft: #c8bee8;
  --pale: #9A8AE7;
  --mid: #7B61E1;
  --deep: #4B3CA1;
  --shadow: #322779;
  --gold: #D4A843;
  --gold-light: #f0c870;
  --gold-dim: #a07e30;

  /* Glass — frosted light */
  --glass: rgba(255, 255, 255, 0.22);
  --glass-hover: rgba(255, 255, 255, 0.35);
  --glass-deep: rgba(50, 39, 121, 0.08);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-border-accent: rgba(212, 168, 67, 0.4);

  /* Text */
  --text: #0a0820;
  --text-mid: #100c38;
  --text-soft: rgba(10, 8, 32, 0.78);
  --text-muted: rgba(10, 8, 32, 0.58);
  --text-on-dark: rgba(255,255,255,0.9);

  --blur: blur(24px);
  --blur-light: blur(12px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.bg-fixed {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Mesh gradient background — the aurora effect from the reference images */
.bg-mesh {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 20% 15%, rgba(185,172,238,0.5) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 80% 25%, rgba(200,190,238,0.4) 0%, transparent 50%),
    radial-gradient(ellipse 60% 70% at 70% 80%, rgba(123,97,225,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 30% 75%, rgba(75,60,161,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 50% 50%, rgba(212,168,67,0.05) 0%, transparent 60%),
    linear-gradient(145deg, #c5bbf0 0%, #B9ACEE 35%, #a99ce0 70%, #9d8fd8 100%);
}

/* Floating aurora blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  animation: blobDrift var(--dur, 20s) ease-in-out infinite alternate;
  mix-blend-mode: multiply;
}

.blob-1 { width: 500px; height: 500px; background: rgba(123,97,225,0.06); top: -150px; left: -100px; --dur: 28s; }
.blob-2 { width: 350px; height: 350px; background: rgba(212,168,67,0.04); top: 20%; right: -80px; --dur: 20s; animation-delay: -10s; }
.blob-3 { width: 450px; height: 400px; background: rgba(75,60,161,0.05); bottom: -100px; right: 10%; --dur: 24s; animation-delay: -7s; }
.blob-4 { width: 300px; height: 300px; background: rgba(154,138,231,0.06); top: 45%; left: 5%; --dur: 18s; animation-delay: -14s; }

@keyframes blobDrift {
  from { transform: translate(0,0) scale(1) rotate(0deg); }
  to { transform: translate(25px,-35px) scale(1.08) rotate(8deg); }
}

/* Noise grain */
.noise {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ===== SCREENS ===== */
.screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ===== LANDING ===== */
#screen-landing {
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 3rem 2rem;
  min-height: 100vh;
}

.landing-inner {
  max-width: 480px;
  width: 100%;
  animation: riseIn 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Premium sigil */
.sigil {
  width: 110px;
  height: 110px;
  margin: 0 auto 2.8rem;
  position: relative;
}

.sigil-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.6);
  animation: spin 40s linear infinite;
}

.sigil-outer::before {
  content: '';
  position: absolute;
  top: -1px; left: 30%;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  transform: translateX(-50%);
}

.sigil-mid {
  position: absolute;
  inset: 16%;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.35);
  animation: spin 25s linear infinite reverse;
}

.sigil-core {
  position: absolute;
  inset: 28%;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(185,172,238,0.4));
  backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 8px 32px rgba(75,60,161,0.2), inset 0 1px 0 rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  animation: corePulse 5s ease-in-out infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes corePulse {
  0%, 100% { box-shadow: 0 8px 32px rgba(75,60,161,0.2), inset 0 1px 0 rgba(255,255,255,0.8); }
  50% { box-shadow: 0 12px 48px rgba(75,60,161,0.35), 0 0 30px rgba(212,168,67,0.15), inset 0 1px 0 rgba(255,255,255,0.9); }
}

.eyebrow {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--deep);
  opacity: 0.6;
  margin-bottom: 0.7rem;
}

.landing-title {
  font-family: 'Inknut Antiqua', serif;
  font-size: clamp(3rem, 8vw, 5rem);
  font-weight: 300;
  color: var(--shadow);
  line-height: 1;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}

.landing-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--deep);
}

.landing-sub {
  font-family: 'Lato', sans-serif;
  font-weight: 200;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 2.8rem;
}

.landing-desc {
  font-family: 'Inknut Antiqua', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: #1a1448;
  opacity: 0.85;
  line-height: 1.9;
  margin-bottom: 3rem;
}

.gold-rule {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 0 auto 2.8rem;
  max-width: 200px;
}
.gold-rule::before, .gold-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,67,0.5), transparent);
}
.gold-rule span {
  color: var(--gold);
  font-size: 0.5rem;
}

/* Stats */
.stats-glass {
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 0.5rem;
  display: flex;
  margin-bottom: 2.5rem;
  box-shadow: 0 8px 32px rgba(75,60,161,0.1), inset 0 1px 0 rgba(255,255,255,0.7);
}

.stat-pill {
  flex: 1;
  padding: 1rem 0.5rem;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.4);
}
.stat-pill:last-child { border-right: none; }

.stat-num {
  font-family: 'Inknut Antiqua', serif;
  font-size: 2rem;
  font-weight: 400;
  color: var(--shadow);
  line-height: 1;
  margin-bottom: 0.3rem;
}

.stat-label {
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-soft);
}

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  border-radius: 50px;
  transition: all 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
  text-decoration: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--deep), var(--shadow));
  color: rgba(255,255,255,0.92);
  padding: 1.05rem 2.8rem;
  box-shadow: 0 6px 30px rgba(75,60,161,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 45px rgba(75,60,161,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  color: #1e1550;
  padding: 1.05rem 2.8rem;
  box-shadow: 0 6px 30px rgba(212,168,67,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
  font-weight: 500;
}

.btn-gold:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 45px rgba(212,168,67,0.45);
}

.btn-glass {
  background: var(--glass);
  backdrop-filter: var(--blur-light);
  border: 1px solid var(--glass-border);
  color: var(--text-mid);
  padding: 0.8rem 1.8rem;
  box-shadow: 0 4px 16px rgba(75,60,161,0.1), inset 0 1px 0 rgba(255,255,255,0.7);
}

.btn-glass:hover {
  background: var(--glass-hover);
  transform: translateY(-2px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-soft);
  border: 1px solid rgba(50,39,121,0.2);
  padding: 0.65rem 1.4rem;
  font-size: 0.65rem;
}

.btn-ghost:hover {
  border-color: var(--deep);
  color: var(--deep);
}

/* ===== WEEK MAP ===== */
#screen-map {
  padding: 2rem;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}

.map-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 2.5rem;
}

.map-title {
  font-family: 'Inknut Antiqua', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--shadow);
}
.map-title em { font-style: italic; color: var(--deep); }

.week-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1rem;
}

.week-card {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 1.6rem;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(75,60,161,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
}

.week-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
}

.week-card:hover {
  background: var(--glass-hover);
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(75,60,161,0.18), inset 0 1px 0 rgba(255,255,255,0.8);
}

.week-card.completed {
  border-color: rgba(212,168,67,0.35);
  background: rgba(255,255,255,0.28);
}

.week-card.completed .week-done-mark {
  display: flex;
}

.week-done-mark {
  display: none;
  position: absolute;
  top: 1.2rem; right: 1.2rem;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dim), var(--gold));
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: #1e1550;
  box-shadow: 0 2px 8px rgba(212,168,67,0.4);
}

.week-card.locked {
  opacity: 0.4;
  cursor: not-allowed;
  filter: grayscale(20%);
}
.week-card.locked:hover { transform: none; box-shadow: 0 4px 20px rgba(75,60,161,0.08); }

.week-num {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 0.58rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 0.5rem;
}

.week-name {
  font-family: 'Inknut Antiqua', serif;
  font-size: 1.3rem;
  font-weight: 400;
  color: var(--shadow);
  margin-bottom: 0.4rem;
  line-height: 1.2;
}

.week-subtitle {
  font-size: 0.75rem;
  color: rgba(20,12,80,0.65);
  line-height: 1.5;
  margin-bottom: 1.2rem;
}

.week-bar {
  height: 1px;
  background: rgba(50,39,121,0.1);
  border-radius: 1px;
  overflow: hidden;
}

.week-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mid), var(--gold));
  box-shadow: 0 0 4px rgba(212,168,67,0.3);
}

/* ===== WEEK DETAIL ===== */
#screen-week {
  max-width: 740px;
  margin: 0 auto;
  width: 100%;
  padding: 2rem;
}

.week-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem 0 0;
  margin-bottom: 3rem;
}

.week-counter {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* Hero */
.week-hero {
  text-align: center;
  padding: 3rem 1rem 2.5rem;
  position: relative;
  margin-bottom: 2rem;
}

.week-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 1px;
  height: 36px;
  background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.5));
}

.hero-eyebrow {
  font-size: 0.58rem;
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 1rem;
  font-family: 'Lato', sans-serif;
  font-weight: 300;
}

.hero-title {
  font-family: 'Inknut Antiqua', serif;
  font-size: clamp(2.2rem, 6vw, 3.2rem);
  font-weight: 300;
  color: var(--shadow);
  margin-bottom: 1.2rem;
  line-height: 1.1;
}

.hero-theme {
  font-family: 'Lato', sans-serif;
  font-style: italic;
  font-size: 0.9rem;
  color: rgba(10,8,32,0.7);
  line-height: 1.85;
  max-width: 480px;
  margin: 0 auto 2rem;
}

.hero-rule {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto;
}

/* Affirmation */
.affirmation {
  background: var(--glass);
  backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 2rem;
  text-align: center;
  margin: 0 0 2.5rem;
  position: relative;
  box-shadow: 0 4px 24px rgba(75,60,161,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
}

.affirmation::before {
  content: '"';
  position: absolute;
  top: -1.5rem; left: 1.5rem;
  font-family: 'Inknut Antiqua', serif;
  font-size: 6rem;
  color: rgba(75,60,161,0.07);
  line-height: 1;
}

.affirmation-text {
  font-family: 'Inknut Antiqua', serif;
  font-size: 1.2rem;
  font-style: italic;
  color: var(--shadow);
  line-height: 1.75;
}

.affirmation-label {
  font-size: 0.58rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-top: 1rem;
  opacity: 0.8;
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid rgba(50,39,121,0.1);
  margin-bottom: 2.5rem;
  overflow-x: auto;
}

.tab {
  padding: 0.9rem 1.5rem;
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  font-size: 0.63rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  transition: all 0.25s;
  background: none;
  border-top: none; border-left: none; border-right: none;
  white-space: nowrap;
}

.tab:hover { color: var(--text-mid); }
.tab.active { color: var(--deep); border-bottom-color: var(--deep); }

.tab-content { display: none; }
.tab-content.active { display: block; animation: riseIn 0.4s ease; }

/* Teaching */
.teaching-block { margin-bottom: 2.5rem; }

.teaching-label {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 0.58rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.teaching-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(212,168,67,0.3), transparent);
}

.teaching-body {
  font-family: 'Lato', sans-serif;
  font-size: 0.95rem;
  color: #100c38;
  line-height: 1.9;
}
.teaching-body p { margin-bottom: 1.2rem; }

.principle-list { list-style: none; margin: 1.2rem 0; }
.principle-list li {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  margin-bottom: 0.8rem;
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  color: #100c38;
  line-height: 1.65;
}
.principle-list li::before {
  content: '◆';
  color: var(--gold);
  font-size: 0.4rem;
  flex-shrink: 0;
  margin-top: 0.6rem;
}

.divider-ornament {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2rem 0;
  color: rgba(75,60,161,0.2);
  font-size: 0.55rem;
  letter-spacing: 0.4em;
}
.divider-ornament::before, .divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(75,60,161,0.12), transparent);
}

/* Exercise cards */
.exercise-card {
  background: var(--glass);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 2rem;
  margin-bottom: 1.2rem;
  position: relative;
  box-shadow: 0 4px 24px rgba(75,60,161,0.07), inset 0 1px 0 rgba(255,255,255,0.7);
  transition: box-shadow 0.3s;
}

.exercise-card:focus-within {
  box-shadow: 0 4px 24px rgba(75,60,161,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
}

.exercise-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  border-radius: 18px 18px 0 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
}

.exercise-type {
  font-family: 'Lato', sans-serif;
  font-weight: 300;
  font-size: 0.56rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 0.4rem;
}

.exercise-title {
  font-family: 'Inknut Antiqua', serif;
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--shadow);
  margin-bottom: 0.7rem;
}

.exercise-body {
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  color: rgba(10,8,32,0.78);
  line-height: 1.85;
  margin-bottom: 1.4rem;
}

/* Journal */
.journal-label {
  font-family: 'Lato', sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.journal-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(50,39,121,0.08);
}

.journal-area {
  width: 100%;
  background: rgba(255,255,255,0.35);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  color: var(--shadow);
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  font-style: italic;
  line-height: 1.8;
  resize: vertical;
  min-height: 110px;
  transition: all 0.3s;
}

.journal-area:focus {
  outline: none;
  background: rgba(255,255,255,0.5);
  border-color: rgba(75,60,161,0.2);

let state = {
  started: false, completedWeeks: [], exerciseData: {},
  progressChecks: {}, daysActive: [], firstStart: null
};

function loadState() {
  const saved = localStorage.getItem('intuitie_premium_v1');
  if (saved) { try { state = JSON.parse(saved); return true; } catch(e) {} }
  return false;
}

function saveState() {
  const today = new Date().toDateString();
  if (!state.daysActive.includes(today)) state.daysActive.push(today);
  if (!state.firstStart) state.firstStart = Date.now();
  localStorage.setItem('intuitie_premium_v1', JSON.stringify(state));
}

function resetProgress() {
  if (confirm('Dit wist al je voortgang. Weet je het zeker?')) {
    localStorage.removeItem('intuitie_premium_v1');
    state = { started: false, completedWeeks: [], exerciseData: {}, progressChecks: {}, daysActive: [], firstStart: null };
    showScreen('screen-landing'); initLanding();
  }
}

function init() { createBlobAnimation(); loadState(); initLanding(); }

function createBlobAnimation() {
  // Subtle additional micro-stars
  document.querySelectorAll('.blob').forEach((b, i) => {
    b.style.setProperty('--dur', (18 + i * 5) + 's');
  });
}

function initLanding() {
  const has = state.started || state.completedWeeks.length > 0;
  document.getElementById('landing-new').style.display = has ? 'none' : 'block';
  document.getElementById('landing-returning').style.display = has ? 'block' : 'none';
  if (has) {
    document.getElementById('stat-weeks').textContent = state.completedWeeks.length;
    document.getElementById('stat-exercises').textContent = Object.keys(state.exerciseData).length;
    document.getElementById('stat-days').textContent = state.daysActive.length;
  }
}

function startJourney() { state.started = true; saveState(); showMap(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showMap() { renderWeekGrid(); showScreen('screen-map'); }

function renderWeekGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = WEEKS.map((w, i) => {
    const done = state.completedWeeks.includes(w.number);
    const locked = i > 0 && !state.completedWeeks.includes(i) && !done;
    const checks = state.progressChecks[`w${w.number}`] || [];
    const pct = w.progress ? Math.round((checks.length / w.progress.length) * 100) : 0;
    return `<div class="week-card ${done?'completed':''} ${locked?'locked':''}" onclick="${locked?'':`openWeek(${w.number})`}">
      <div class="week-done-mark">✦</div>
      <div class="week-num">Week ${w.number}</div>
      <div class="week-name">${w.name}</div>
      <div class="week-subtitle">${w.subtitle}</div>
      <div class="week-bar"><div class="week-bar-fill" style="width:${pct}%"></div></div>
      ${locked?'<div style="font-size:0.6rem;color:var(--text-muted);margin-top:0.6rem;letter-spacing:0.08em">Voltooi vorige week om te ontgrendelen</div>':''}
    </div>`;
  }).join('');
}

function openWeek(n) {
  const week = WEEKS.find(w => w.number === n);
  document.getElementById('week-content').innerHTML = renderWeekContent(week);
  showScreen('screen-week');
  initWeekInteractions(week);
}

function renderWeekContent(week) {
  const checks = state.progressChecks[`w${week.number}`] || [];
  return `
    <div class="week-nav">
      <button class="btn btn-ghost" onclick="showMap()">← Alle Weken</button>
      <div class="week-counter">Week ${week.number} van 12</div>
    </div>
    <div class="week-hero">
      <div class="hero-eyebrow">Intuïtie · Week ${week.number}</div>
      <div class="hero-title">${week.name}</div>
      <div class="hero-theme">${week.theme}</div>
      <div class="hero-rule"></div>
    </div>
    <div class="affirmation">
      <div class="affirmation-text">${week.affirmation}</div>
      <div class="affirmation-label">Affirmatie van Deze Week</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(event,'tab-learn')">Lessen</button>
      <button class="tab" onclick="switchTab(event,'tab-practice')">Oefeningen</button>
      <button class="tab" onclick="switchTab(event,'tab-progress')">Voortgang</button>
    </div>
    <div class="tab-content active" id="tab-learn">
      ${week.teachings.map((t,i) => `
        <div class="teaching-block">
          <div class="teaching-label">${t.title}</div>
          <div class="teaching-body">${t.body}</div>
        </div>
        ${i < week.teachings.length-1 ? '<div class="divider-ornament">✦ ✦ ✦</div>' : ''}
      `).join('')}
    </div>
    <div class="tab-content" id="tab-practice">
      ${week.exercises.map((ex,ei) => renderExercise(ex, week.number, ei)).join('')}
    </div>
    <div class="tab-content" id="tab-progress">
      <div class="teaching-label" style="margin-bottom:1.2rem">Dagelijkse Checklist</div>
      <div class="progress-list">
        ${week.progress.map((item, pi) => {
          const done = checks.includes(pi);
          return `<div class="progress-item ${done?'is-done':''}">
            <div class="progress-text">${item}</div>
            <div class="check ${done?'done':''}" onclick="toggleCheck(${week.number},${pi},this)">${done?'✦':''}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="complete-section">
        ${state.completedWeeks.includes(week.number)
          ? '<div class="complete-badge">✦ &nbsp; Week Voltooid &nbsp; ✦</div>'
          : `<button class="btn btn-primary" onclick="completeWeek(${week.number})">Deze Week Voltooien</button>
             <p style="font-size:0.75rem;color:var(--text-muted);margin-top:1rem;font-family:'Inknut Antiqua', serif;font-style:italic">Markeer als voltooid wanneer je alle checklistitems hebt doorgewerkt.</p>`
        }
      </div>
    </div>
    <div class="bottom-nav">
      ${week.number > 1 ? `<button class="btn btn-ghost" onclick="openWeek(${week.number-1})">← Week ${week.number-1}</button>` : '<div></div>'}
      ${week.number < 12 ? `<button class="btn btn-ghost" onclick="openWeek(${week.number+1})">Week ${week.number+1} →</button>` : '<div></div>'}
    </div>`;
}

function renderExercise(ex, weekNum, idx) {
  const key = `w${weekNum}_ex${idx}`;
  let extras = '';

  if (ex.hasTimer) extras += `
    <div class="timer-wrap">
      <div class="timer-label-top">Meditatie Timer</div>
      <div class="timer-ring-wrap">
        <svg class="timer-svg" width="150" height="150" viewBox="0 0 150 150">
          <defs><linearGradient id="tg${idx}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4B3CA1"/><stop offset="100%" stop-color="#D4A843"/>
          </linearGradient></defs>
          <circle class="timer-track" cx="75" cy="75" r="65"/>
          <circle class="timer-progress" id="prog${idx}" cx="75" cy="75" r="65"
            stroke="url(#tg${idx})" stroke-dasharray="${2*Math.PI*65}" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-display" id="tlabel${idx}">—</div>
      </div>
      <div class="timer-controls">
        <select class="timer-select" id="tdur${idx}">
          <option value="300">5 min</option><option value="600">10 min</option>
          <option value="1200" selected>20 min</option><option value="1800">30 min</option>
        </select>
        <button class="btn btn-primary" style="padding:0.6rem 1.4rem;font-size:0.65rem" onclick="startTimer(${idx})">Beginnen</button>
        <button class="btn btn-ghost" style="padding:0.6rem 1.2rem" onclick="stopTimer(${idx})">Stoppen</button>
      </div>
    </div>`;

  if (ex.hasChakras) extras += `
    <div class="chakra-grid">${CHAKRAS.map((c,ci) => `
      <div class="chakra-card" onclick="showChakraDetail(${ci})">
        <div class="chakra-dot" style="background:${c.color};box-shadow:0 0 10px ${c.color}66"></div>
        <div class="chakra-name">${c.name}</div>
        <div class="chakra-loc">${c.location}</div>
      </div>`).join('')}</div>
    <div class="chakra-detail" id="chakra-detail"></div>`;

  if (ex.hasDrawing) extras += `
    <div class="canvas-wrap">
      <canvas id="rv-canvas" width="400" height="260"></canvas>
      <div class="canvas-tools">
        <span style="font-size:0.58rem;color:var(--text-muted);letter-spacing:0.2em">KLEUR</span>
        ${['#322779','#7B61E1','#D4A843','#9A8AE7','#48bb78','#fc8181','#1e1550'].map(c =>
          `<div class="swatch" style="background:${c}" onclick="setDrawColor('${c}',this)"></div>`).join('')}
        <div class="swatch" style="background:rgba(200,190,232,0.3);border:1px solid rgba(50,39,121,0.2)" onclick="setDrawColor('rgba(200,190,232,0.3)',this)" title="Gum"></div>
        <button class="btn btn-ghost" style="padding:0.4rem 1rem;font-size:0.6rem" onclick="clearCanvas()">Wissen</button>
      </div>
    </div>`;

  if (ex.hasSensitivity && ex.sensitivityItems) {
    extras += ex.sensitivityItems.map((item, si) => `
      <div class="sens-item">
        <div class="sens-label">${item}</div>
        <input type="range" class="sens-slider" min="1" max="10" value="5"
          oninput="this.parentElement.querySelector('.sens-val').textContent=this.value"
          onchange="saveSlider('${key}_s${si}',this.value)">
        <div class="sens-row">
          <span>Geblokkeerd</span>
          <span style="color:var(--gold-dim)">Huidig: <span class="sens-val">5</span></span>
          <span>Wijd Open</span>
        </div>
      </div>`).join('');
  }

  if (ex.hasRating && ex.ratings) {
    extras += ex.ratings.map((item, ri) => `
      <div style="margin-bottom:1rem">
        <div style="font-family:'Inknut Antiqua', serif;font-size:0.95rem;color:var(--text-mid);margin-bottom:0.3rem">${item}</div>
        <div class="rating-row">
          ${[1,2,3,4,5].map(n => `<span class="rating-star" onclick="setRating('${key}_r${ri}',${n},this.parentElement)">★</span>`).join('')}
          <span class="rating-hint">Zelden → Vaak</span>
        </div>
      </div>`).join('');
  }

  const questions = ex.questions ? ex.questions.map((q, qi) => `
    <div class="question-item">
      <div class="question-text">${q}</div>
      <textarea class="journal-area" style="min-height:70px" placeholder="Jouw reflectie..."
        onblur="saveResponse('${key}_q${qi}',this.value)">${state.exerciseData[`${key}_q${qi}`]||''}</textarea>
    </div>`).join('') : '';

  const journal = ex.journalPrompt ? `
    <div class="journal-label">Dagboek Notitie</div>
    <textarea class="journal-area" placeholder="${ex.journalPrompt}"
      onblur="saveResponse('${key}_j',this.value)">${state.exerciseData[`${key}_j`]||''}</textarea>
    <div class="save-row">
      <span class="saved-flash" id="sf_${key}">✦ Opgeslagen</span>
      <button class="btn btn-ghost" style="padding:0.5rem 1.2rem;font-size:0.6rem" onclick="manualSave('${key}_j',this)">Opslaan</button>
    </div>` : '';

  return `<div class="exercise-card">
    <div class="exercise-type">${ex.type}</div>
    <div class="exercise-title">${ex.title}</div>
    <div class="exercise-body">${ex.body}</div>
    ${extras}${questions}${journal}
  </div>`;
}

function switchTab(e, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function toggleCheck(wn, pi, el) {
  const key = `w${wn}`;
  if (!state.progressChecks[key]) state.progressChecks[key] = [];
  const arr = state.progressChecks[key];
  const i = arr.indexOf(pi);
  const item = el.closest('.progress-item');
  if (i === -1) {
    arr.push(pi);
    el.classList.add('done'); el.textContent = '✦';
    if (item) item.classList.add('is-done');
  } else {
    arr.splice(i,1);
    el.classList.remove('done'); el.textContent = '';
    if (item) item.classList.remove('is-done');
  }
  saveState();
}

function completeWeek(n) {
  if (!state.completedWeeks.includes(n)) {
    state.completedWeeks.push(n); saveState();
    showToast('✦  Week ' + n + ' voltooid — het pad gaat verder');
    setTimeout(() => {
      if (n < 12) { if (confirm('Klaar om Week ' + (n+1) + ' te openen?')) openWeek(n+1); else showMap(); }
      else { showToast('✦  Je hebt het volledige Intuïtie programma voltooid ✦'); showMap(); }
    }, 1600);
  }
}

function saveResponse(k, v) { state.exerciseData[k] = v; saveState(); }

function manualSave(key, btn) {
  const ta = btn.parentElement.previousElementSibling;
  if (ta) saveResponse(key, ta.value);
  const fl = document.getElementById('sf_' + key.replace(/_j$/, ''));
  if (fl) { fl.style.opacity = 1; setTimeout(() => fl.style.opacity = 0, 2000); }
  showToast('Opgeslagen ✦');
}

function setRating(key, val, container) {
  state.exerciseData[key] = val; saveState();
  container.querySelectorAll('.rating-star').forEach((s,i) => s.classList.toggle('active', i < val));
}

function saveSlider(k, v) { state.exerciseData[k] = v; saveState(); }

const timers = {};
function startTimer(idx) {
  if (timers[idx]) clearInterval(timers[idx]);
  const dur = parseInt(document.getElementById(`tdur${idx}`)?.value || 1200);
  let rem = dur;
  const circ = 2 * Math.PI * 65;
  const progEl = document.getElementById(`prog${idx}`);
  const labEl = document.getElementById(`tlabel${idx}`);
  const tick = () => {
    const m = Math.floor(rem/60), s = rem%60;
    if (labEl) labEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (progEl) progEl.style.strokeDashoffset = circ*(1-rem/dur);
    if (rem <= 0) { clearInterval(timers[idx]); showToast('✦  Meditatie voltooid'); return; }
    rem--;
  };
  tick(); timers[idx] = setInterval(tick, 1000);
}

function stopTimer(idx) {
  if (timers[idx]) { clearInterval(timers[idx]); delete timers[idx]; }
  const l = document.getElementById(`tlabel${idx}`); if (l) l.textContent = '—';
  const p = document.getElementById(`prog${idx}`); if (p) p.style.strokeDashoffset = 0;
}

let drawColor = '#322779', drawing = false, lastX = 0, lastY = 0;
function setDrawColor(c, el) {
  drawColor = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}
function clearCanvas() {
  const cv = document.getElementById('rv-canvas');
  if (cv) cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}
function initWeekInteractions() {
  setTimeout(() => {
    const cv = document.getElementById('rv-canvas');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const pos = e => {
      const r = cv.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return [(t.clientX-r.left)*(cv.width/r.width),(t.clientY-r.top)*(cv.height/r.height)];
    };
    cv.addEventListener('mousedown', e => { drawing=true; [lastX,lastY]=pos(e); });
    cv.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; [lastX,lastY]=pos(e); }, {passive:false});
    const draw = e => {
      if (!drawing) return;
      if (e.touches) e.preventDefault();
      const [x,y] = pos(e);
      ctx.beginPath(); ctx.strokeStyle=drawColor; ctx.lineWidth=2.5;
      ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
      [lastX,lastY]=[x,y];
    };
    cv.addEventListener('mousemove', draw);
    cv.addEventListener('touchmove', draw, {passive:false});
    ['mouseup','mouseleave','touchend'].forEach(ev => cv.addEventListener(ev, () => drawing=false));
  }, 100);
}

function showChakraDetail(idx) {
  const c = CHAKRAS[idx];
  const d = document.getElementById('chakra-detail');
  if (!d) return;
  d.innerHTML = `
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem">
      <div style="width:40px;height:40px;border-radius:50%;background:${c.color};box-shadow:0 0 16px ${c.color}88;flex-shrink:0"></div>
      <div>
        <div style="font-family:'Inknut Antiqua', serif;font-size:1.05rem;color:var(--shadow)">${c.name} Chakra</div>
        <div style="font-size:0.65rem;color:var(--text-muted);letter-spacing:0.08em">${c.sanskrit} · ${c.location}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:0.8rem">
      <div><div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:0.2rem">Element</div><div style="font-family:'Inknut Antiqua', serif;font-size:0.95rem;color:var(--text-mid)">${c.element}</div></div>
      <div><div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:0.2rem">Sleutelwoord</div><div style="font-family:'Inknut Antiqua', serif;font-size:0.95rem;color:var(--text-mid)">${c.keywords}</div></div>
    </div>
    <div style="margin-bottom:0.7rem"><div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:0.2rem">Beheert</div><div style="font-family:'Inknut Antiqua', serif;font-size:0.9rem;color:var(--text-mid)">${c.governs}</div></div>
    <div style="margin-bottom:0.7rem"><div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--deep);opacity:0.6;margin-bottom:0.2rem">Open Als</div><div style="font-family:'Inknut Antiqua', serif;font-style:italic;font-size:0.9rem;color:var(--text-soft)">${c.openWhen}</div></div>
    <div><div style="font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:0.2rem">Geblokkeerd Als</div><div style="font-family:'Inknut Antiqua', serif;font-style:italic;font-size:0.9rem;color:var(--text-soft)">${c.blockedWhen}</div></div>`;
  d.classList.add('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
